name: Socket Firewall

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  firewall:
    name: Socket Firewall
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect dependency manager
        id: dependency-manager
        run: |
          set -euo pipefail

          if [ -f bun.lock ] || [ -f bunfig.toml ] || { [ -f package.json ] && grep -q '"packageManager"[[:space:]]*:[[:space:]]*"bun@' package.json; }; then
            echo "name=bun" >> "$GITHUB_OUTPUT"
          else
            echo "name=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun canary
        if: steps.dependency-manager.outputs.name == 'bun'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: canary

      - name: Run Bun install with Socket scanner
        if: steps.dependency-manager.outputs.name == 'bun'
        run: |
          set -euo pipefail

          bun run tools/verify-socket-config.ts
          bun install --frozen-lockfile --ignore-scripts

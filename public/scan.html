<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Medlock Scan</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/assets/styles.css?v=2" />
  </head>
  <body>
    <main class="scan-page">
      <a class="brand" href="/" aria-label="Medlock home">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Medlock</span>
      </a>
      <section class="scan-panel" aria-labelledby="scan-title">
        <p class="eyebrow">Local-first scan handoff</p>
        <h1 id="scan-title">Camera vitals scanning is not enabled in this public deployment.</h1>
        <p>
          The MCP tool returns this page as a safe handoff target. Private deployments can attach a browser-side scan
          flow here without allowing the server to activate a camera.
        </p>
      </section>
    </main>
  </body>
</html>
